<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="circ">
      <circle cx="16" cy="16" r="16"/>
    </clipPath>
  </defs>
  <!-- Orange background -->
  <circle cx="16" cy="16" r="16" fill="#F26822"/>
  <!-- White cutouts clipped to circle -->
  <g clip-path="url(#circ)" fill="#FFF">
    <!-- Left gap (outside left arm of M) -->
    <rect x="0" y="0" width="7.2" height="21.5"/>
    <!-- Right gap (outside right arm of M) -->
    <rect x="24.8" y="0" width="7.2" height="21.5"/>
    <!-- Center V between the two M arms -->
    <polygon points="7.2,13.5 16,21.5 24.8,13.5"/>
  </g>
  <!-- Dark charcoal lower section — crown top follows bottom of M arms -->
  <path fill="#4C4C4C" clip-path="url(#circ)"
    d="M0,21.5 L7.2,21.5 L16,25 L24.8,21.5 L32,21.5 L32,32 L0,32 Z"/>
</svg>
