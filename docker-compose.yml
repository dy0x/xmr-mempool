services:
  backend:
    build: ./backend
    environment:
      PORT: 3001
      MONERO_HOST: ${MONERO_HOST:-192.168.0.12}
      MONERO_RPC_PORT: ${MONERO_RPC_PORT:-18081}
      MONERO_RPC_USER: ${MONERO_RPC_USER:-monero}
      MONERO_RPC_PASS: ${MONERO_RPC_PASS}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
